<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Futuristic 3D Search</title>
    <style>
        /* کدهای CSS را اینجا قرار دادم */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none;
        }
        .search-container {
            background: rgba(0, 20, 40, 0.4); padding: 40px;
            border: 1px solid #00f2ff; box-shadow: 0 0 20px #00f2ff55;
            pointer-events: all; backdrop-filter: blur(5px); text-align: center;
            border-radius: 15px;
        }
        input {
            background: transparent; border: none;
            border-bottom: 2px solid #00f2ff; color: #00f2ff;
            padding: 10px; font-size: 1.2rem; outline: none;
            width: 300px; text-align: center;
        }
        .status-bar {
            display: flex; justify-content: space-between;
            color: #00f2ff; font-size: 0.8rem; margin-top: 15px;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="ui-wrapper">
        <div class="search-container">
            <h2 style="color: #00f2ff; letter-spacing: 3px;">VOYAGER SEARCH</h2>
            <input type="text" placeholder="جستجو در شبکه...">
            <div class="status-bar">
                <span>SYSTEM: ONLINE</span>
                <span>LATENCY: 12ms</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // کدهای JavaScript
        let scene, camera, renderer, stars;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02 });
            const starVertices = [];
            for (let i = 0; i < 6000; i++) {
                starVertices.push((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            animate();
        }
        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
